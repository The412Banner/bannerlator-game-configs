name: Sync + canonicalize from BannerHub

# Reads BannerHub's public game-configs (games.json/devices.json) READ-ONLY and rebuilds our
# canonical index. Writes ONLY this repo — never touches The412Banner/bannerhub-game-configs.
# Incremental: reuses existing appids in games_steam.json; only re-resolves new/unresolved folders.

on:
  schedule:
    - cron: '0 6 * * *'          # daily 06:00 UTC — safety net + pick up upstream's new configs
  workflow_dispatch:             # also fired on-demand by trigger-on-upload.yml when a user uploads
    inputs:
      force:
        description: 'Re-resolve ALL folders (ignore the seed cache)'
        type: boolean
        default: false

concurrency:
  group: sync-canonicalize
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Canonicalize from BannerHub (upstream read-only)
        env:
          FORCE_RERESOLVE: ${{ inputs.force && '1' || '0' }}
        run: python3 tools/canonicalize.py

      - name: Commit index if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add games_canonical.json unresolved.json games_steam.json steam_index.json CANON_REPORT.txt stats.json games.json
          if git diff --cached --quiet; then echo "No changes."; exit 0; fi
          git commit -m "chore: daily sync + canonicalize from BannerHub [skip ci]"
          # User uploads land on main mid-run (the canonicalize step takes ~30s), so a bare
          # push races the upload and gets rejected. Rebase-and-retry so a concurrent push
          # doesn't fail the sync — pull the upload, re-stack our index commit, push again.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push rejected (attempt $i) — rebasing on remote main and retrying"
            git pull --rebase --autostash origin main || exit 1
          done
          echo "push still failing after 5 retries"; exit 1
